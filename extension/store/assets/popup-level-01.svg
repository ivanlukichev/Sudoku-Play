      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E7F0FD"/>
    </linearGradient>
    <linearGradient id="card" x1="300" y1="140" x2="980" y2="860" gradientUnits="userSpaceOnUse">
