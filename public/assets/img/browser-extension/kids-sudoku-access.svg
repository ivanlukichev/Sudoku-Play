<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-label="Sudoku Play extension kids Sudoku access">
  <rect width="1280" height="800" fill="#fff9fb"/>
