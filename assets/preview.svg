  </g>
  <rect x="120" y="368" width="170" height="52" rx="26" fill="#2f7de1"/>
  <text x="205" y="402" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Play now</text>
  <rect x="308" y="368" width="170" height="52" rx="26" fill="#eef5fd" stroke="#c9ddf3"/>
  <text x="393" y="402" text-anchor="middle" fill="#18324d" font-family="Arial, sans-serif" font-size="24" font-weight="700">Daily puzzle</text>
  <text x="120" y="492" fill="#7290ad" font-family="Arial, sans-serif" font-size="22">Live at sudoku-play.org</text>
